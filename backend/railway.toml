# Railway configuration — backend (FastAPI) service.
# In Railway dashboard → New Service → set Root Directory = "backend/"

[build]
builder        = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# start.sh: waits for DB → alembic upgrade head → uvicorn
startCommand        = "./start.sh"
healthcheckPath     = "/health"
healthcheckTimeout  = 300
restartPolicyType   = "on-failure"
restartPolicyMaxRetries = 10
